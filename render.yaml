services:
  - type: web
    name: novarescue-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SIMULATION_MODE
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: "info"
      - key: APP_ENV
        value: "production"
